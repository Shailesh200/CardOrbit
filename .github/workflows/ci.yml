name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify milestone quality gates
        run: bun run verify:milestone

  # Optional / parallel: consumer web Playwright (desktop + PWA viewports).
  # Stubs `/api` in-test — no live API required. See docs/ux/SCREEN_STATE_AUDIT.md.
  e2e-web:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Run web E2E
        working-directory: apps/web
        run: bun run e2e
        env:
          CI: true
