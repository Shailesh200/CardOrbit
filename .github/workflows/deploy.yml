name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test/lint job (emergency only)'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Lint, typecheck, tests
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run verify:milestone

  build-images:
    name: Build and push Docker images
    needs: [quality]
    if: always() && (needs.quality.result == 'success' || needs.quality.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            file: infra/docker/Dockerfile.api
          - name: worker
            file: infra/docker/Dockerfile.worker
          - name: scheduler
            file: infra/docker/Dockerfile.scheduler
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Coolify deploy + migrate
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_WEBHOOK_URL:-}" ]; then
            echo "COOLIFY_WEBHOOK_URL secret not set — skipping remote deploy trigger."
            echo "Configure Coolify GitHub auto-deploy or set the webhook secret."
            exit 0
          fi
          curl -fsS -X POST \
            ${COOLIFY_TOKEN:+-H "Authorization: Bearer ${COOLIFY_TOKEN}"} \
            "$COOLIFY_WEBHOOK_URL"
          echo "Coolify deploy triggered."

      - name: Run Prisma migrate (SSH to VPS)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOST:-}" ] || [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "DEPLOY_HOST / DEPLOY_SSH_KEY not set — migrate via Coolify post-deploy command instead."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && IMAGE_TAG='${IMAGE_TAG}' docker compose -f infra/docker/docker-compose.production.yml --env-file .env.production --profile migrate run --rm migrate && docker compose -f infra/docker/docker-compose.production.yml --env-file .env.production up -d api worker scheduler"
