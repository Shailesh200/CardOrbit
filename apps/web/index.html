<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#050816" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="CardOrbit — your AI-powered financial orbit. Optimize credit cards, rewards, offers, travel, and payments with intelligent recommendations."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CardOrbit · Your AI-powered financial orbit" />
    <meta
      property="og:description"
      content="An AI-powered financial operating system for India — optimize every payment across cards, rewards, offers, and travel."
    />
    <meta property="og:locale" content="en_IN" />
    <title>CardOrbit · Your AI-powered financial orbit</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      /* Apply persisted theme before paint to avoid a flash of the wrong theme. */
      (function applyStoredTheme() {
        try {
          var stored = localStorage.getItem('cardwise.theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Layout stability + hero colors before full stylesheet (cuts CLS/LCP jitter) */
      body {
        margin: 0;
        background: #050816;
        color: #f9fafb;
      }
      .site-header {
        min-height: 3.5rem;
      }
      .home-hero {
        min-height: calc(100dvh - 3.5rem);
        background: #050816;
      }
      .home-ambient {
        background: #050816;
      }
      .home-headline {
        color: #f9fafb;
      }
      .home-headline-accent {
        color: #8eb6ff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function loadFontsDeferred() {
        var inter =
          'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
        function inject(url) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = url;
          document.head.appendChild(link);
        }
        function schedule() {
          window.setTimeout(function () {
            inject(inter);
          }, 10000);
        }
        if (document.readyState === 'complete') {
          schedule();
        } else {
          window.addEventListener('load', schedule, { once: true });
        }
      })();
    </script>
  </body>
</html>
