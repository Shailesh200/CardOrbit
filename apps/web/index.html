    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta
      name="description"

    />
    <link rel="canonical" href="https://cardorbit.in/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CardOrbit" />
    <meta property="og:url" content="https://cardorbit.in/" />
    <meta property="og:title" content="CardOrbit" />
    <meta
      property="og:description"
      content="Add your cards, get merchant recommendations with estimated rewards, track offers and travel benefits, and optionally import Gmail credit-card spend alerts."
    />
    <meta property="og:locale" content="en_IN" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CardOrbit" />
    <meta
      name="twitter:description"
      content="Credit-card recommendations, portfolio tracking, rewards insight, and optional Gmail spend sync for India."
    />
    <title>CardOrbit</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "CardOrbit",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://cardorbit.in/",
        "description": "CardOrbit helps people in India choose the best credit card for every purchase, with portfolio tracking, merchant recommendations, rewards insight, and optional Gmail spend-alert import.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        }
      }
    </script>
    <script>
      /* Apply persisted theme before paint to avoid a flash of the wrong theme.
         Cookie Domain=.cardorbit.in keeps landing ↔ app signup in sync. */
      (function applyStoredTheme() {
        try {
          var stored = null;
          try {
            stored = localStorage.getItem('cardorbit.theme') || localStorage.getItem('cardwise.theme');
          } catch (e) {}
          if (stored !== 'light' && stored !== 'dark') {
            var match = document.cookie.match(/(?:^|;\s*)(?:cardorbit|cardwise)\.theme=(light|dark)(?:;|$)/);
            stored = match ? match[1] : null;
          }
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.dataset.theme = theme;
          if (theme === 'light') {
            document.documentElement.style.backgroundColor = '#f4f6fb';
            document.documentElement.style.color = '#0f172a';
          } else {
            document.documentElement.style.backgroundColor = '#050816';
            document.documentElement.style.color = '#f9fafb';
          }
          try {
            var parts = [
              'cardorbit.theme=' + theme,
              'path=/',
              'max-age=31536000',
              'SameSite=Lax',
            ];
            var host = location.hostname;
            if (host === 'cardorbit.in' || host.slice(-14) === '.cardorbit.in') {
              parts.push('Domain=.cardorbit.in');
            }
            if (location.protocol === 'https:') parts.push('Secure');
            document.cookie = parts.join('; ');
            localStorage.setItem('cardorbit.theme', theme);
            localStorage.removeItem('cardwise.theme');
          } catch (e) {}
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      /* Layout stability + hero colors before full stylesheet (cuts CLS/LCP jitter) */
      html {
        overflow-x: clip;
        background: #050816;
        color: #f9fafb;
      }
      body {
        margin: 0;
        overflow-x: clip;
        background: inherit;
        color: inherit;
      }
      html:not(.dark) {
        background: #f4f6fb;
        color: #0f172a;
      }
      .site-header {
        min-height: 3.5rem;
      }
      .home-hero {
        min-height: calc(100dvh - 3.5rem);
        background: #050816;
      }
      .home-ambient {
        background: #050816;
      }
      .home-headline {
        color: #f9fafb;
      }
      .home-headline-accent {
        color: #8eb6ff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function loadFontsDeferred() {
        var inter =
          'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
        function inject(url) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = url;
          document.head.appendChild(link);
        }
        function schedule() {
          window.setTimeout(function () {
            inject(inter);
          }, 10000);
        }
        if (document.readyState === 'complete') {
          schedule();
        } else {
          window.addEventListener('load', schedule, { once: true });
        }
      })();
    </script>
  </body>
</html>
